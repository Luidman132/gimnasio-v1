server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compresión para JS/CSS/JSON (reduce mucho la carga inicial)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # La API vive detrás del MISMO origen: el navegador llama a /api/...
    # y nginx lo reenvía al contenedor PHP por la red interna de Docker.
    # Ventajas: sin CORS, sin URL horneada en el build, y el puerto del
    # backend nunca se expone a la red.
    location /api/ {
        proxy_pass http://gym-api:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 8m;
    }

    # Assets de Vite llevan hash en el nombre: caché larga e inmutable.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Imágenes públicas (fondo, logos)
    location ~* \.(jpg|jpeg|png|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA: cualquier otra ruta devuelve index.html (sin caché, para que
    # cada despliegue nuevo se vea de inmediato).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
